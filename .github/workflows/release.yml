name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: web
        run: bun install --frozen-lockfile && bun run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          platforms=(
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "darwin/amd64"
            "darwin/arm64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"

            PKG="copilot-go_${VERSION}_${GOOS}_${GOARCH}"
            mkdir -p "dist/${PKG}"

            GOOS="$GOOS" GOARCH="$GOARCH" CGO_ENABLED=0 \
              go build -ldflags="-s -w" \
              -o "dist/${PKG}/copilot-go${EXT}" .

            cp -r web/dist "dist/${PKG}/web"

            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip -r "${PKG}.zip" "${PKG}")
            else
              tar -czf "dist/${PKG}.tar.gz" -C dist "${PKG}"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip

  docker:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose file
        run: |
          sed "s|\${DOCKER_IMAGE}|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest|g" \
            docker-compose.prod.yml > docker-compose.deploy.yml

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: docker-compose.deploy.yml
          target: ~/copilot2api-go
          strip_components: 0

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            ARCH=$(uname -m)
            echo "🖥️ 服务器架构: ${ARCH}"

            # 登录 GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            # 进入部署目录
            cd ~/copilot2api-go
            mv docker-compose.deploy.yml docker-compose.yml

            # 拉取最新镜像并重启服务（Docker 自动匹配架构）
            docker compose pull
            docker compose up -d --remove-orphans

            # 清理旧镜像
            docker image prune -f

            echo "✅ 部署完成！架构: ${ARCH}"